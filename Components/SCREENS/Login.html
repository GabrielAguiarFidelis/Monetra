<!DOCTYPE html>
<html lang="pt-BR">
<head>
       <meta charset="UTF-8">
       <meta http-equiv="X-UA-Compatible" content="IE=7">
       <meta http-equiv="X-UA-Compatible" content="ie=edge">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       
       <title>Login | Monetra</title>

       <link rel="stylesheet" href="/Components/CSS/login.css">
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
       <div class="container">
              <!-- Login Form -->
               <div class="form-box login"></div>

              <!-- Registration Form -->
               <div class="form-box register"></div>

              <!-- Toggle Box -->
               <div class="toggle-box">
                     <!-- Toggle Box Left -->
                     <div class="toggle-panel toggle-left"></div>

                     <!-- Toggle Box Right -->
                     <div class="toggle-panel toggle-right">
                            <h1>Welcome Back!</h1>
                            <p>Already have an account?</p>
                            <button class="btn login-btn">Login</button>
                     </div>
               </div>
       </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/Components/JS/login.js"></script>
</html>
